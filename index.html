<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Практическая работа №5 — Starter Kit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Практическая работа №5: BOM, таймеры и диалоги</h1>
  </header>

  <main>
    <section class="card" id="stopwatch-section">
      <h2>Задание 1 — Секундомер</h2>
      <div class="controls">
        <span class="display" id="stopwatch-display">00:00:00</span>
        <div class="buttons">
          <button id="sw-start">Старт</button>
          <button id="sw-stop">Стоп</button>
          <button id="sw-reset">Сброс</button>
        </div>
      </div>
    </section>

    <section class="card" id="countdown-section">
      <h2>Задание 2 — Обратный отсчёт</h2>
      <label for="countdown-seconds">Секунд:</label>
      <input id="countdown-seconds" type="number" min="1" max="3600" value="10" />
      <div class="buttons">
        <button id="cd-start">Старт</button>
        <button id="cd-stop">Стоп</button>
        <button id="cd-reset">Сброс</button> 
      </div>
      <div class="output" id="countdown-display">—</div>
    </section>

    <section class="card" id="notification-section">
  <h2>Задание 3 — Уведомления</h2>
  <div class="buttons">
    <button id="notification-show">Показать уведомление через 3 сек</button>
  </div>
  
  <div id="notification">
    Операция выполнена успешно!
    <button id="notification-close">Закрыть</button>
  </div>
</section>

    <section class="card" id="browser-info-section">
      <h2>Задание 4 — Информация о браузере</h2>
      <div class="buttons">
        <button id="browser-info-btn">Показать информацию</button>
      </div>
      <div class="output" id="browser-info" style="text-align: left; font-size: 14px; margin-top: 15px;">—</div>
    </section>
  
    <section class="card" id="dialogs-section">
      <h2>Диалоговые окна</h2>
      <div class="buttons">
        <button id="btn-alert">alert()</button>
        <button id="btn-confirm">confirm()</button>
        <button id="btn-prompt">prompt()</button>
        
      </div>
      <div id="dialog-result">Результат: —</div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
